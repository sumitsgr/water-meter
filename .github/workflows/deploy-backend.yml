name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'water-meter-api/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: water-meter-api/package-lock.json

      - name: Install dependencies locally
        working-directory: water-meter-api
        run: npm ci

      - name: Syntax check
        working-directory: water-meter-api
        run: |
          node --check src/app.js
          node --check src/controllers/auth.controller.js
          node --check src/controllers/user.controller.js

      - name: Package backend
        run: |
          tar \
            --exclude='node_modules' \
            --exclude='.env' \
            -czf water-meter-api.tar.gz \
            water-meter-api

      - name: Setup SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -e

          if [ -z "$EC2_HOST" ]; then
            echo "EC2_HOST secret is missing."
            exit 1
          fi

          if [ -z "$EC2_SSH_KEY" ]; then
            echo "EC2_SSH_KEY secret is missing."
            exit 1
          fi

          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$EC2_SSH_KEY" > "$HOME/.ssh/ec2_key"
          chmod 600 "$HOME/.ssh/ec2_key"

          ssh-keyscan -T 30 -H "$EC2_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Upload backend to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          scp -i "$HOME/.ssh/ec2_key" water-meter-api.tar.gz \
            "$EC2_USER@$EC2_HOST:/tmp/water-meter-api.tar.gz"

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          API_ENV: ${{ secrets.API_ENV }}
        run: |
          ssh -i "$HOME/.ssh/ec2_key" "$EC2_USER@$EC2_HOST" << EOF
          set -e

          mkdir -p ~/apps
          rm -rf ~/apps/water-meter-api
          tar -xzf /tmp/water-meter-api.tar.gz -C ~/apps

          cd ~/apps/water-meter-api
          printf '%s\n' "$API_ENV" > .env

          npm ci --omit=dev

          if pm2 list | grep -q water-meter-api; then
            pm2 restart water-meter-api
          else
            pm2 start ecosystem.config.cjs
          fi

          pm2 save
          EOF
